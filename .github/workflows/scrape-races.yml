name: Daily Race Scraper

on:
  schedule:
    # 3:00 AM IST = 21:30 UTC (previous day)
    - cron: '30 21 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run scraper
        run: node backend/scrape-to-file.js

      - name: Commit updated races.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update race calendar data [$(date -u '+%Y-%m-%d')]"
          git push
